name: Publish

# Triggers when you push a version tag: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - "v*.*.*"

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write

jobs:
  # ─── Gate: full test suite must pass before any publish ───────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.toml') }}

      - name: Clippy
        run: cd rust && cargo clippy -- -D warnings

      - name: Rust tests
        run: cd rust && cargo test

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Build Rust lib for Go tests
        run: cd rust && cargo build --release

      - name: Set library path (Linux)
        if: runner.os == 'Linux'
        run: echo "LD_LIBRARY_PATH=$GITHUB_WORKSPACE/rust/target/release" >> $GITHUB_ENV

      - name: Set library path (macOS)
        if: runner.os == 'macOS'
        run: echo "DYLD_LIBRARY_PATH=$GITHUB_WORKSPACE/rust/target/release" >> $GITHUB_ENV

      - name: Go tests
        run: cd go && CGO_ENABLED=1 go test -v -count=1 .

  # ─── Publish Rust crate to crates.io ──────────────────────────────────────
  publish-rust:
    name: Publish Rust crate
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-publish-${{ hashFiles('rust/Cargo.toml') }}

      - name: Publish to crates.io
        run: cd rust && cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ─── Tag Go module (pkg.go.dev picks it up automatically) ─────────────────
  publish-go:
    name: Tag Go module
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Push go/ prefixed tag for Go module proxy
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "go/v${{ steps.version.outputs.VERSION }}"
          git push origin "go/v${{ steps.version.outputs.VERSION }}"

  # ─── Create GitHub Release with changelog ─────────────────────────────────
  release:
    name: GitHub Release
    needs: [publish-rust, publish-go]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Install

            **Rust**
            ```toml
            [dependencies]
            ffi-bridge = "${{ github.ref_name }}"
            ```

            **Go**
            ```bash
            go get github.com/ChainPrimitives/ffi-bridge@${{ github.ref_name }}
            ```
