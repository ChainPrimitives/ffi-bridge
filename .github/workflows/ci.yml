name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  # ─── Rust ───────────────────────────────────────────────────────────────────
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.toml') }}

      - name: Check formatting
        run: cd rust && cargo fmt --check

      - name: Clippy
        run: cd rust && cargo clippy -- -D warnings

      - name: Build
        run: cd rust && cargo build --release

      - name: Test
        run: cd rust && cargo test

      - name: Run example
        run: cd rust && cargo run --example basic --release

  # ─── Go ─────────────────────────────────────────────────────────────────────
  go:
    name: Go (${{ matrix.os }})
    needs: rust
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.toml') }}

      - name: Build Rust library
        run: cd rust && cargo build --release

      - name: Go vet
        run: cd go && CGO_ENABLED=1 go vet .

      - name: Go test
        run: cd go && CGO_ENABLED=1 go test -v -count=1 .

      - name: Go benchmarks
        run: cd go && CGO_ENABLED=1 go test -bench=. -benchmem -run='^$' .

  # ─── Format check (Go) ──────────────────────────────────────────────────────
  fmt-go:
    name: Go fmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      - name: Check formatting
        run: |
          unformatted=$(gofmt -l go/)
          if [ -n "$unformatted" ]; then
            echo "The following files are not formatted:"
            echo "$unformatted"
            exit 1
          fi
